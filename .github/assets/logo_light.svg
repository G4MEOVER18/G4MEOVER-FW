    <line x1="-10" y1="40" x2="0" y2="40" stroke="#059669" stroke-width="2"/>
    <line x1="-10" y1="60" x2="0" y2="60" stroke="#059669" stroke-width="2"/>
    <line x1="80" y1="20" x2="90" y2="20" stroke="#059669" stroke-width="2"/>
    <line x1="80" y1="40" x2="90" y2="40" stroke="#059669" stroke-width="2"/>
