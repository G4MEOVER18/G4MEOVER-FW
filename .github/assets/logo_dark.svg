<svg xmlns="http://www.w3.org/2000/svg" width="900" height="200" viewBox="0 0 900 200">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0f1e"/>
      <stop offset="100%" style="stop-color:#0d1a0d"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glow2">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="900" height="200" fill="url(#bg)" rx="12"/>
  <rect width="900" height="200" fill="none" stroke="#10b981" stroke-width="1.5" rx="12" opacity="0.4"/>

  <!-- Left accent bar -->
  <rect x="0" y="0" width="6" height="200" fill="#10b981" rx="3" opacity="0.9"/>

  <!-- Icon: stylized chip/skull -->
  <g transform="translate(48, 60)" filter="url(#glow)">
    <!-- Chip outline -->
    <rect x="0" y="0" width="80" height="80" rx="8" fill="none" stroke="#10b981" stroke-width="2"/>
    <!-- Chip pins left -->
    <line x1="-10" y1="20" x2="0" y2="20" stroke="#10b981" stroke-width="2"/>
    <line x1="-10" y1="40" x2="0" y2="40" stroke="#10b981" stroke-width="2"/>
    <line x1="-10" y1="60" x2="0" y2="60" stroke="#10b981" stroke-width="2"/>
    <!-- Chip pins right -->
    <line x1="80" y1="20" x2="90" y2="20" stroke="#10b981" stroke-width="2"/>
    <line x1="80" y1="40" x2="90" y2="40" stroke="#10b981" stroke-width="2"/>
    <line x1="80" y1="60" x2="90" y2="60" stroke="#10b981" stroke-width="2"/>
    <!-- Chip pins top -->
    <line x1="20" y1="-10" x2="20" y2="0" stroke="#10b981" stroke-width="2"/>
    <line x1="60" y1="-10" x2="60" y2="0" stroke="#10b981" stroke-width="2"/>
    <!-- Chip pins bottom -->
    <line x1="20" y1="80" x2="20" y2="90" stroke="#10b981" stroke-width="2"/>
    <line x1="60" y1="80" x2="60" y2="90" stroke="#10b981" stroke-width="2"/>
    <!-- Inner die -->
    <rect x="16" y="16" width="48" height="48" rx="4" fill="#10b981" opacity="0.12"/>
    <rect x="16" y="16" width="48" height="48" rx="4" fill="none" stroke="#10b981" stroke-width="1" opacity="0.6"/>
    <!-- G4 text in chip -->
    <text x="40" y="46" font-family="monospace" font-size="22" font-weight="900" fill="#10b981" text-anchor="middle">G4</text>
  </g>

  <!-- Main title -->
  <text x="178" y="90" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',monospace" font-size="64" font-weight="900" fill="#10b981" filter="url(#glow)" letter-spacing="2">G4MEOVER</text>

  <!-- Subtitle -->
  <text x="180" y="125" font-family="monospace" font-size="15" font-weight="600" fill="#94a3b8" letter-spacing="4">CUSTOM FLIPPER ZERO FIRMWARE</text>

  <!-- Tags row -->
  <g transform="translate(180, 148)">
    <!-- Tag 1 -->
    <rect x="0" y="0" width="90" height="22" rx="4" fill="#10b981" opacity="0.15"/>
    <text x="45" y="15" font-family="monospace" font-size="10" font-weight="700" fill="#10b981" text-anchor="middle" letter-spacing="1">API 87.1</text>
    <!-- Tag 2 -->
    <rect x="98" y="0" width="110" height="22" rx="4" fill="#8b5cf6" opacity="0.15"/>
    <text x="153" y="15" font-family="monospace" font-size="10" font-weight="700" fill="#8b5cf6" text-anchor="middle" letter-spacing="1">mntm-012</text>
    <!-- Tag 3 -->
    <rect x="216" y="0" width="110" height="22" rx="4" fill="#06b6d4" opacity="0.15"/>
    <text x="271" y="15" font-family="monospace" font-size="10" font-weight="700" fill="#06b6d4" text-anchor="middle" letter-spacing="1">lora_ukfe</text>
    <!-- Tag 4 -->
    <rect x="334" y="0" width="110" height="22" rx="4" fill="#f59e0b" opacity="0.15"/>
    <text x="389" y="15" font-family="monospace" font-size="10" font-weight="700" fill="#f59e0b" text-anchor="middle" letter-spacing="1">CH-DE BadUSB</text>
  </g>

  <!-- Right: version badge -->
  <g transform="translate(760, 75)">
    <rect x="0" y="0" width="110" height="50" rx="8" fill="#10b981" opacity="0.1"/>
    <rect x="0" y="0" width="110" height="50" rx="8" fill="none" stroke="#10b981" stroke-width="1" opacity="0.5"/>
    <text x="55" y="20" font-family="monospace" font-size="10" font-weight="700" fill="#64748b" text-anchor="middle" letter-spacing="1">VERSION</text>
    <text x="55" y="42" font-family="monospace" font-size="20" font-weight="900" fill="#10b981" text-anchor="middle">v1.0.0</text>
  </g>
</svg>
